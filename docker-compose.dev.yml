services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cloudify
      POSTGRES_PASSWORD: cloudify
      POSTGRES_DB: cloudify
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cloudify']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: valkey/valkey:8-alpine
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  gitea:
    image: gitea/gitea:1.22
    environment:
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=postgres:5432
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=cloudify
      - GITEA__database__PASSWD=cloudify
      - GITEA__server__ROOT_URL=http://localhost:3300
      - GITEA__server__HTTP_PORT=3300
    ports:
      - '3300:3300'
    volumes:
      - giteadata:/data
    depends_on:
      postgres:
        condition: service_healthy

  nats:
    image: nats:2.10-alpine
    command: ['--jetstream', '--store_dir', '/data', '--http_port', '8222']
    ports:
      - '4222:4222'
      - '8222:8222'
    volumes:
      - natsdata:/data
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:8222/healthz']
      interval: 5s
      timeout: 5s
      retries: 5

  vault:
    image: hashicorp/vault:1.17
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - '8200:8200'
    cap_add:
      - IPC_LOCK

volumes:
  pgdata:
  redisdata:
  natsdata:
  giteadata:
